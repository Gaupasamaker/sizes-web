<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sizes</title>
  <meta name="description" content="Sizes language router." />
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://sizes.es/" />
  <link rel="alternate" hreflang="es" href="https://sizes.es/es/" />
  <link rel="alternate" hreflang="en" href="https://sizes.es/en/" />
  <link rel="alternate" hreflang="x-default" href="https://sizes.es/" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/favicon.png" />
</head>
<body>
  <noscript>
    <p><a href="/es/">Espa&ntilde;ol</a> | <a href="/en/">English</a></p>
  </noscript>
  <script>
    (function () {
      var storageKey = 'sizes-preferred-locale';
      var preferred = null;

      try {
        preferred = localStorage.getItem(storageKey);
      } catch (error) {
        preferred = null;
      }

      if (!preferred) {
        var languages = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || 'en']).join(',').toLowerCase();
        preferred = languages.indexOf('es') !== -1 ? 'es' : 'en';
      }

      window.location.replace(preferred === 'es' ? '/es/' : '/en/');
    }());
  </script>
</body>
</html>
