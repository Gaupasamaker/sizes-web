    <style>
        body {
            background-color: #FDFBF7;
            color: #0A1128;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .elegant-border {
            border: 1px solid #E2DFD8;
        }
        .bg-noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            background-repeat: repeat;
        }
        .iso-scene {
            perspective: 2500px;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            will-change: transform;
        }
        .iso-container {
            transform: rotateX(55deg) rotateZ(-40deg) translateZ(0);
            transform-style: preserve-3d;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
        }
        .iso-phone {
            width: 280px;
            height: 580px;
            border-radius: 40px;
            border: 10px solid #0A1128;
            background: #0A1128;
            overflow: hidden;
            box-shadow:
                -1px 1px 0px #444, -2px 2px 0px #444, -3px 3px 0px #444, -4px 4px 0px #3A3A40,
                -5px 5px 0px #3A3A40, -6px 6px 0px #3A3A40, -7px 7px 0px #2A2A30, -8px 8px 0px #2A2A30,
                -9px 9px 0px #2A2A30, -10px 10px 0px #1A1A24, -11px 11px 0px #1A1A24, -12px 12px 0px #1A1A24,
                -13px 13px 0px #0D0D12, -14px 14px 0px #0D0D12, -15px 15px 0px #0D0D12, -16px 16px 0px #000,
                -40px 40px 60px rgba(10, 17, 40, 0.5);
            position: absolute;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            will-change: transform;
        }
        .iso-phone img {
            image-rendering: high-quality;
            image-rendering: -webkit-optimize-contrast;
            transform: translateZ(1px);
        }
        .iso-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateZ(2px);
            width: 110px;
            height: 26px;
            background: #0A1128;
            border-bottom-left-radius: 14px;
            border-bottom-right-radius: 14px;
            z-index: 30;
        }
        @keyframes float-bot {
            0%, 100% { transform: translateZ(0px); }
            50% { transform: translateZ(15px); }
        }
        @keyframes float-mid {
            0%, 100% { transform: translateZ(90px); }
            50% { transform: translateZ(110px); }
        }
        @keyframes float-top {
            0%, 100% { transform: translateZ(180px); }
            50% { transform: translateZ(205px); }
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            animation: marquee 120s linear infinite;
        }
        .animate-marquee:hover {
            animation-play-state: paused;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
